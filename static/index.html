<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aura Concierge - AI Travel Planner</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c6c6c6",
                        "primary": "#c6c6c6",
                        "background": "#131315",
                        "inverse-primary": "#5e5e5e",
                        "inverse-on-surface": "#303032",
                        "secondary-fixed": "#d7e2ff",
                        "error": "#ffb4ab",
                        "surface-container-high": "#2a2a2c",
                        "surface": "#131315",
                        "tertiary-fixed": "#e1e0ff",
                        "surface-container-low": "#1b1b1d",
                        "surface-dim": "#131315",
                        "tertiary-container": "#000000",
                        "tertiary": "#c0c1ff",
                        "outline-variant": "#4c4546",
                        "on-secondary-fixed-variant": "#024590",
                        "on-primary-container": "#757575",
                        "on-secondary": "#002f66",
                        "error-container": "#93000a",
                        "secondary-container": "#024590",
                        "on-tertiary-fixed": "#07006c",
                        "on-background": "#e4e2e4",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "on-surface": "#e4e2e4",
                        "on-primary-fixed": "#1b1b1b",
                        "secondary": "#acc7ff",
                        "surface-tint": "#c6c6c6",
                        "outline": "#988e90",
                        "on-secondary-fixed": "#001b3f",
                        "surface-container-lowest": "#0e0e10",
                        "surface-container": "#1f1f21",
                        "secondary-fixed-dim": "#acc7ff",
                        "on-tertiary": "#1000a9",
                        "on-primary": "#303030",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#8fb5ff",
                        "surface-container-highest": "#353437",
                        "primary-container": "#000000",
                        "inverse-surface": "#e4e2e4",
                        "surface-bright": "#39393b",
                        "on-tertiary-container": "#6164ef",
                        "surface-variant": "#353437",
                        "on-primary-fixed-variant": "#474747",
                        "primary-fixed": "#e2e2e2",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "on-surface-variant": "#cfc4c5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "max-width": "1200px",
                        "section-gap": "64px",
                        "gutter": "16px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"]
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="font-body-md text-body-md overflow-x-hidden custom-scrollbar">

    <!-- Top Navigation Bar -->
    <header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-white/5 h-20 transition-all">
        <div class="flex justify-between items-center px-container-padding h-full max-w-max-width mx-auto">
            <div class="flex items-center gap-4">
                <button class="text-primary hover:opacity-80 transition-all p-2">
                    <span class="material-symbols-outlined" data-icon="menu">menu</span>
                </button>
                <span class="font-headline-lg text-primary tracking-widest uppercase hidden md:block">Aura Concierge</span>
            </div>
            <h1 class="font-headline-lg-mobile md:font-headline-lg text-primary">AI PLANNER</h1>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-white/10">
                    <img class="w-full h-full object-cover" alt="Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrPMwZdCr9DGkdk7o4H-J_86YWB6B054SbWoGwVdsMyMxIYDhD7KCdmRp4Avx8eBC9hgrMWD0a-dwwOu6sIEKfNpUS1icVqnDXKmOQFhdwgpI2BcCFSUgYRiGA-UqJUaIGWp0rbsPa7uSO1MuUJTA5l0wjZBlE-0NIYYTxWcloMGma_5hza6iMXlYENpzBIVltWGNzv4lmXlLEA0_KsLu3PeA8ypb7W6HjMfZMIsbiUw_Mwbuqd7duLQ"/>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-32 px-container-padding max-w-max-width mx-auto relative">
        <!-- Background Atmospheric Aura -->
        <div class="fixed top-1/4 left-1/2 -translate-x-1/2 w-full h-[500px] aura-glow pointer-events-none -z-10"></div>

        <!-- Hero & Form Section -->
        <div id="hero-section" class="text-center mb-16 animate-in fade-in duration-700">
            <h2 class="font-headline-xl text-headline-xl text-on-surface mb-4">Your Voice-Based<br><span class="text-secondary">Luxury Travel Planner</span></h2>
            <p class="text-on-surface-variant text-body-lg mb-8 max-w-2xl mx-auto">Tell me what you want, and my specialized AI agents will curate the perfect itinerary.</p>
            
            <form id="trip-form" class="max-w-3xl mx-auto glass-card p-2 rounded-full flex flex-col md:flex-row items-center gap-2">
                <button type="button" id="mic-btn" class="w-12 h-12 flex-shrink-0 rounded-full flex items-center justify-center text-primary hover:text-secondary hover:bg-white/5 transition-all" title="Click to start/stop recording">
                    <span class="material-symbols-outlined" data-icon="mic">mic</span>
                </button>
                
                <select id="location-select" class="bg-transparent border-none text-body-md py-3 px-4 outline-none focus:ring-0 text-on-surface w-full md:w-auto text-center md:text-left cursor-pointer">
                    <option value="Dubai" class="bg-surface-container">Dubai, UAE</option>
                    <option value="Abu Dhabi" class="bg-surface-container">Abu Dhabi, UAE</option>
                    <option value="Doha" class="bg-surface-container">Doha, Qatar</option>
                    <option value="Riyadh" class="bg-surface-container">Riyadh, KSA</option>
                </select>
                
                <div class="hidden md:block h-8 w-px bg-white/10 flex-shrink-0"></div>
                
                <input type="text" id="prompt" name="prompt" class="flex-1 bg-transparent border-none text-on-surface py-3 px-4 outline-none placeholder:text-on-surface-variant/50 focus:ring-0 w-full" placeholder="E.g., Plan a 3-day trip focused on architecture..." required autocomplete="off">
                
                <button type="submit" id="submit-btn" class="w-full md:w-auto px-8 py-3 rounded-full bg-secondary text-on-secondary font-label-md hover:brightness-110 transition-all flex items-center justify-center gap-2 flex-shrink-0 shadow-lg shadow-secondary/20">
                    <span>Plan Trip</span>
                    <span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
                </button>
            </form>
        </div>

        <!-- Observability Section -->
        <section id="observability" class="hidden mb-16 glass-card rounded-2xl p-8 max-w-3xl mx-auto">
            <div class="flex items-center gap-4 mb-6">
                <h3 class="font-headline-lg text-on-surface">Agents at Work</h3>
                <div class="loader"></div>
            </div>
            <ul id="agent-logs" class="agent-logs">
                <!-- Logs populated via JS -->
            </ul>
        </section>

        <!-- Result Section -->
        <section id="result" class="hidden space-y-section-gap animate-in fade-in duration-1000">
            <!-- Rendered itinerary goes here via JS -->
        </section>
        
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full flex justify-around items-center h-20 px-8 pb-4 bg-surface-container-low/90 dark:bg-surface-container-low/90 backdrop-blur-md border-t border-white/5 z-50 rounded-t-xl shadow-2xl">
        <a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined" data-icon="explore">explore</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined" data-icon="mic">mic</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary bg-secondary-container/20 rounded-full p-3 scale-95 duration-200" href="#">
            <span class="material-symbols-outlined" data-icon="event_note">event_note</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors" href="#">
            <span class="material-symbols-outlined" data-icon="person">person</span>
        </a>
    </nav>

    <script src="/static/app.js"></script>
    <script>
        // Handle sticky header opacity on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('bg-surface/95');
            } else {
                header.classList.remove('bg-surface/95');
            }
        });
    </script>
</body>
</html>
