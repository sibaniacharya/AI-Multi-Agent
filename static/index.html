<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai AI Travel Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Dubai AI Travel Planner</h1>
            <p>Tell me what you want, and my specialized AI agents will curate the perfect itinerary.</p>
        </header>

        <section class="chat-section">
            <form id="trip-form">
                <div class="input-wrapper glass">
                    <button type="button" id="mic-btn" class="mic-btn" title="Click to start/stop recording">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <input type="text" id="prompt" name="prompt" placeholder="E.g., Plan a 3-day luxury trip focused on architecture and fine dining..." required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span>Plan Trip</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </section>

        <section id="observability" class="observability-section glass hidden">
            <div class="status-header">
                <h2>Agents at Work</h2>
                <div class="loader"></div>
            </div>
            <ul id="agent-logs" class="agent-logs">
                <!-- Logs populated via JS -->
            </ul>
        </section>

        <section id="result" class="result-section hidden">
            <!-- Rendered itinerary goes here -->
        </section>
    </main>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
